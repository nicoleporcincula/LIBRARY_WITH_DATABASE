<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url("images/login_bg.png") center/cover no-repeat;
        }

        .login-container, .signup-container {
            background: url("images/scroll.png") center/contain no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 90%;
            max-width: 650px;
            min-height: 600px;
            padding: 10px;
            color: white;
        }

        .login-container h2, .signup-container h2 {
            font-family: 'Cinzel', serif;
            text-align: center;
            margin-bottom: 15px;
            color: #2B1B10;
            font-size: 35px;
        }

        .input-group {
            margin-bottom: 10px;
            width: 100%;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #2B2B2B;
            font-family: 'Lora', serif;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            font-family: 'Lora', serif;
            font-size: 14px;
            color: #3B2A1A;
            background-color: #fdf6e3;
            border: 1px solid #6B4F2A;
            border-radius: 10px;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #4e73df;
            outline: none;
        }

        .login-btn {
            width: 100%;
            padding: 10px;
            font-family: 'Lora', serif;
            font-size: 16px;
            color: white;
            background-color: #6B4F2A;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background-color: #5A3F21;
        }

        .extra-links {
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
            font-family: 'Lora', serif;
        }

        .extra-links a {
            text-decoration: none;
            color: white;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        .error-message {
            display: none;
            text-align: center;
            color: #8B1C1C;
            font-family: 'Lora', serif;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Login</h2>
        <form action="login.php" method="POST">
 
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="error-message"></div>

            <button type="submit" class="login-btn">Login</button>

            <div class="extra-links">
                <p>Don't have an account? <a href="#">Sign Up</a></p>
            </div>
        </form>
    </div>

    <div class="signup-container" style="display: none;">
        <h2>Sign Up</h2>
        <form action="signup.php" method="POST">
            
            <div class="input-group">
                <label for="signup-name">Full Name</label>
                <input type="text" id="signup-name" name="signup_name" placeholder="Enter your full name" required>
            </div>
            <div class="input-group">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" name="signup_email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" name="signup_password" placeholder="Enter your password" required>
            </div>

            <div class="error-message">
                <?php
                if(session_status() === PHP_SESSION_NONE) session_start();
                if(isset($_SESSION['error'])) { echo $_SESSION['error']; unset($_SESSION['error']); }
                if(isset($_SESSION['success'])) { echo "<span style='color:green'>".$_SESSION['success']."</span>"; unset($_SESSION['success']); }
                ?>
            </div>

            <button type="submit" class="login-btn">Sign Up</button>
            <div class="extra-links">
                <p>Already have an account? <a href="#" id="back-to-login">Login</a></p>
            </div>
        </form>
    </div>

<script>
    const loginContainer = document.querySelector('.login-container');
    const signupContainer = document.querySelector('.signup-container');

    const signupLink = loginContainer.querySelector('.extra-links a[href="#"]');
    const backToLoginLink = document.getElementById('back-to-login');

    signupLink.addEventListener('click', e => {
        e.preventDefault();
        loginContainer.style.display = 'none';
        signupContainer.style.display = 'flex';
    });

    backToLoginLink.addEventListener('click', e => {
        e.preventDefault();
        signupContainer.style.display = 'none';
        loginContainer.style.display = 'flex';
    });

    const loginForm = loginContainer.querySelector('form');
    const loginError = loginForm.querySelector('.error-message');

    loginForm.addEventListener('submit', e => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        if(!email || !password) {
            e.preventDefault();
            loginError.textContent = "Please fill in all fields.";
            loginError.style.display = "block";
        }
    });

    const signupForm = signupContainer.querySelector('form');
    const signupError = signupForm.querySelector('.error-message');

    signupForm.addEventListener('submit', e => {
        const name = document.getElementById('signup-name').value.trim();
        const email = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value.trim();

        if(!name || !email || !password) {
            e.preventDefault();
            signupError.textContent = "Please fill in all fields.";
            signupError.style.display = "block";
        } else {
            signupError.style.display = "none";
        }
    });

    // Show login errors from URL query string
    const urlParams = new URLSearchParams(window.location.search);
    const errorMsg = urlParams.get('error');

    if(errorMsg) {
        loginError.textContent = errorMsg;
        loginError.style.display = 'block';

        const url = new URL(window.location);
        url.searchParams.delete('error');
        window.history.replaceState({}, document.title, url);

        setTimeout(() => { loginError.style.display = 'none'; }, 3000);
    }
</script>

</body>
</html>
