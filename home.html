            <div class="search-bar">
                <input type="text" placeholder="Search the Labyrinth of Books...">
            </div>

            <div class="books-section">
                <div class="books-container" id="booksContainer"></div>
                <div class="carousel-controls">
                    <button class="nav-btn">❮</button>

                    <button class="nav-btn">❯</button>
                </div>

    <script>
        const books = [
            { title: "The Whispering Oaks", author: "E. Vance" },
            { title: "Maps of the Forgotten", author: "R. Croft" },
            { title: "Ancient Runes", author: "A. Black" },
            { title: "Stargazer's Tale", author: "L. Wren" },
            { title: "Lost Kingdoms", author: "J. Thorne" }
        ];

        const container = document.getElementById('booksContainer');
        books.forEach(book => {
            const div = document.createElement('div');
            div.className = 'book';
            div.innerHTML = `<h4>${book.title}</h4><p>${book.author}</p>`;
            container.appendChild(div);
        });

        const profile = document.getElementById('profile');
        const dropdown = document.getElementById('profileDropdown');

        profile.addEventListener('click', () => {
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        });

        document.addEventListener('click', (e) => {
            if (!profile.contains(e.target)) dropdown.style.display = 'none';
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            window.location.href = 'logout.php';
        });
    </script>
