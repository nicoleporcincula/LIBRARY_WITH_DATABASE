<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>The Chronicle</title>

    <!-- Font for aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <div class="sidebar">
            <h1 class="logo">CANDLEFERN<br>LIBRARY</h1>

            <ul>
                <li>🌙 My Archive</li>
                <li>📖 Reading List</li>
                <li>🔖 Bookmarks</li>
                <li>🔔 Notifications</li>
                <li>⚙ Settings</li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main">

            <!-- Search Bar -->
            <div class="search-bar">
                <input type="text" placeholder="Search the Labyrinth of Books...">
            </div>

            <!-- Books -->
            <div class="books-section">

                <div class="books-container" id="booksContainer"></div>

                <!-- Carousel Controls -->
                <div class="carousel-controls">
                    <button class="nav-btn">❮</button>
                    <span class="scroll-label">SCROLL TO EXPLORE</span>
                    <button class="nav-btn">❯</button>
                </div>

            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
